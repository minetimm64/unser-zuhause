<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>🏠 Unser Zuhause</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;height:100dvh;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
body{background:#0A080E;display:flex;justify-content:center;align-items:center;overflow:hidden;position:fixed;inset:0;height:100dvh}
#g{width:100%;height:100%;display:flex;justify-content:center;align-items:center;touch-action:none}
#g canvas{box-shadow:0 0 80px rgba(80,40,180,0.2),0 0 30px rgba(0,0,0,0.9);touch-action:none}
#rotateOverlay{display:none;position:fixed;inset:0;z-index:9999;background:#0A080E;color:#F0E8FF;flex-direction:column;justify-content:center;align-items:center;text-align:center;font-family:Arial,sans-serif;padding:24px}
#rotateOverlay .icon{font-size:56px;margin-bottom:18px;animation:rotHint 1.6s ease-in-out infinite}
#rotateOverlay p{font-size:16px;line-height:1.5;max-width:320px;color:#C8B8E0}
@keyframes rotHint{0%,100%{transform:rotate(0deg)}50%{transform:rotate(90deg)}}
@media (orientation:portrait) and (max-width:900px){#rotateOverlay{display:flex}}
</style>
</head>
<body>
<div id="rotateOverlay"><div class="icon">📱↻</div><p>Bitte dein Handy quer halten (Querformat)<br>für die beste Ansicht 🏠</p></div>
<div id="g"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
<script src="game.js"></script>
</body>
</html>
